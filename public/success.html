<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Complete | Sassy Consulting LLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #606060;
            --accent-primary: #22c55e;
            --border-subtle: #222222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #000;
            margin: 0 auto 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: var(--text-secondary); margin-bottom: 2rem; }
        .license-box {
            background: var(--bg-secondary);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .license-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-primary); margin-bottom: 0.5rem; }
        .license-key {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            word-break: break-all;
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent-primary); color: #000; }
        .btn-primary:hover { background: #16a34a; }
        .btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border-subtle); margin-left: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">[OK]</div>
        <h1>Purchase Complete!</h1>
        <p>Thank you for your purchase. Your license key is below. Save it somewhere safe.</p>
        
        <div class="license-box">
            <div class="license-label">Your License Key</div>
            <div class="license-key" id="license-key">Loading...</div>
            <button onclick="copyLicense()" class="btn btn-primary">Copy License</button>
        </div>
        
        <p style="font-size: 0.9rem;">A copy has also been sent to your email.</p>
        
        <div id="download-links" style="display: none; margin-top: 1.5rem; padding: 1.5rem; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: 12px;">
            <div class="license-label" style="margin-bottom: 1rem;">Download Your Software</div>
            <a id="apk-download" href="#" class="btn btn-primary" style="margin-bottom: 0.5rem; display: inline-block;">Download Android APK</a>
            <br>
            <a id="msi-download" href="#" class="btn btn-secondary" style="margin-top: 0.5rem; display: inline-block;">Download Windows MSI</a>
        </div>

        <div style="margin-top: 2rem;">
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');
        
        if (sessionId) {
            fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            })
            .then(r => r.json())
            .then(data => {
                if (data.license_key) {
                    document.getElementById('license-key').textContent = data.license_key;
                    // Show download links with license key embedded
                    if (data.product === 'sassy-talk') {
                        const key = encodeURIComponent(data.license_key);
                        document.getElementById('apk-download').href = '/download/sassytalk/android/SassyTalk-latest.apk?key=' + key;
                        document.getElementById('msi-download').href = '/download/sassytalk/windows/SassyTalk-1.0.0-x64.msi?key=' + key;
                        document.getElementById('download-links').style.display = 'block';
                    }
                }
            });
        }
        
        function copyLicense() {
            navigator.clipboard.writeText(document.getElementById('license-key').textContent);
            alert('License key copied!');
        }
    </script>
</body>
</html>
