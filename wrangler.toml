name = "sassyconsultingllc"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./public"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "sassy-db"
database_id = "ed5f3cc4-fa38-4eaa-b9ac-8480eb24e2be"

# R2 Storage for downloads
[[r2_buckets]]
binding = "DOWNLOADS"
bucket_name = "sassy-downloads"

# Environment variables (non-secret)
[vars]
SITE_URL = "https://sassyconsultingllc.com"
MYBESTSITES_URL = "https://mybestsites.online"

# Secrets (add via: wrangler secret put SECRET_NAME)
# Required secrets:
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - STRIPE_PRICE_SASSY_TALK
# - STRIPE_PRICE_WINFORENSICS
# - STRIPE_PRICE_WEBSITE_CREATOR
# - LICENSE_SALT
# - POSTMARK_API_KEY (optional, for email)

send_email = [
    { name = "CONTACT_EMAIL", destination_address = "shane@sassyconsulting.com" }
]